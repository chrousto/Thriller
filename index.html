<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Message Viewer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>Message Viewer</h1>
    <div class="search">
        <input type="text" id="searchText" placeholder="Search in body">
        <label for="searchDate">From:</label>
        <input type="date" id="searchDate">
        <label for="searchDateEnd">To:</label>
        <input type="date" id="searchDateEnd">
        <select id="searchType">
            <option value="">All Types</option>
        </select>
        <select id="searchSender">
            <option value="">All Senders</option>
        </select>
    </div>
    <div id="messages"></div>
    <script src="script.js"></script>
</body>
</html>
